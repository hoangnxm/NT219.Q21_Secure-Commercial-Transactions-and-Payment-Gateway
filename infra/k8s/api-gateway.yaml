apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: nt219-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: payment_api_gateway:v1  # Image mày sẽ build
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: nt219-project
spec:
  type: LoadBalancer # Cực kỳ quan trọng để K3d map ra port 8000
  selector:
    app: api-gateway
  ports:
  - port: 80
    targetPort: 80