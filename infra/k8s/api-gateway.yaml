apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: nt219-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: payment_api_gateway:v1
        ports:
        - containerPort: 80
        # BƠM CHỨNG CHỈ VÀO GATEWAY
        volumeMounts:
        - name: cert-volume
          mountPath: "/certs"
          readOnly: true
      volumes:
      - name: cert-volume
        secret:
          secretName: master-mtls-certs
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: nt219-project
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
  - port: 80
    targetPort: 80